# Lista de todos os contêineres
services:

  # 1. O serviço do Backend (Django)
  backend:
    build: ../dadlandbackend # Caminho relativo para subir um nível e entrar no backend
    ports:
      # Mapeia a porta 8000
      - "8000:8000"
    volumes:
      - ../dadlandbackend:/app # Permite o hot-reload
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      # Aguarda o banco de dados
      db:
        condition: service_healthy # Faz o Django esperar o banco de dados estar pronto
    networks:
      - dadland-network

  # 2. O serviço do Frontend (Next.js)
  frontend:
    build: ../dadlandfrontend # Caminho relativo para o frontend
    ports:
      - "3000:3000"
    volumes:
      - ../dadlandfrontend:/app # Permite o hot-reload
    env_file:
      - .env
    networks:
      - dadland-network
    depends_on:
      - backend

  # 3. O serviço do Banco de Dados (PostgreSQL)
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dadland-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

# Volumes para persistência de dados
volumes:
  postgres-data: {}

# Rede privada para comunicação entre os serviços
networks:
  dadland-network:
    driver: bridge
